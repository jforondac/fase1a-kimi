<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio de Usuarios</title>
  <meta name="description" content="Directorio de usuarios con datos en vivo desde JSONPlaceholder API">
  <meta property="og:title" content="Directorio de Usuarios">
  <meta property="og:description" content="Directorio de usuarios con datos en vivo">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://fase1a-kimi.vercel.app/">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans antialiased selection:bg-cyan-500/30">
    <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
      <symbol id="icon-email" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </symbol>
      <symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
      </symbol>
      <symbol id="icon-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
      </symbol>
    </svg>
  <!-- Anuncios para lectores de pantalla (invisible) -->
    <noscript>
      <div style="background:#0f172a; color:#cbd5e1; padding:20px; text-align:center; font-family:sans-serif;">
        <h2>JavaScript requerido</h2>
        <p>Esta aplicación necesita JavaScript para mostrar los datos de los usuarios.</p>
      </div>
    </noscript>
<div id="status-announce" aria-live="polite" aria-atomic="true" class="sr-only"></div>
  <main class="max-w-7xl mx-auto px-4 py-12">
    <header class="mb-12 text-center">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 bg-clip-text text-transparent mb-2">
        Directorio de Usuarios
      </h1>
      <p class="text-slate-400 text-sm tracking-widest uppercase">Datos en vivo · JSONPlaceholder API</p>
    </header>

    <div id="loading" class="flex flex-col items-center justify-center gap-4 py-20">
      <div class="w-10 h-10 border-4 border-cyan-500/20 border-t-cyan-400 rounded-full animate-spin"></div>
      <p class="text-cyan-400 font-medium tracking-wide animate-pulse">Sincronizando datos...</p>
    </div>

    <div id="error" class="hidden max-w-md mx-auto">
  <div class="bg-red-500/10 border border-red-500/20 rounded-2xl p-6 text-center backdrop-blur-sm">
    <div class="w-12 h-12 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-3">
      <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
    </div>
    <h3 class="text-red-300 font-semibold mb-1">Conexión fallida</h3>
    <p class="text-red-400/70 text-sm mb-4">Verifica tu red e intenta recargar.</p>
    <button id="btn-retry" class="px-4 py-2 bg-red-500/20 hover:bg-red-500/40 text-red-300 rounded-lg transition-colors">
      Reintentar
    </button>
  </div>
</div>



    <div id="lista" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  </main>

  <script src="index.js"></script>
</body>
</html>
